version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: causalchurn_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: causalpassword123
      POSTGRES_DB: causalchurn
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: causalchurn_api
    restart: always
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://postgres:causalpassword123@db:5432/causalchurn
    depends_on:
      - db

volumes:
  postgres_data:
